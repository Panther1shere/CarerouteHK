<main class="shell">
  <header class="topbar">
    <div class="brand">
      <div class="crest" aria-hidden="true"></div>
      <div class="brand-copy">
        <span class="brand-eyebrow">Hong Kong Government</span>
        <strong>Policy Input Tool</strong>
      </div>
    </div>
  </header>

  <section class="workspace">
    <div class="intro">
      <p class="eyebrow">Policy Workspace</p>
      <h1>Include your policy.</h1>
      <p class="lead">
        Paste or draft the policy text below for structured review.
      </p>
    </div>

    <section class="panel">
      <label class="sr-only" for="policy-input">Policy input</label>
      <textarea
        id="policy-input"
        [ngModel]="briefInput()"
        (ngModelChange)="onInputChange($event)"
        placeholder="Include your policy..."
      ></textarea>

      <div class="actions">
        <span class="key-hint">Press Enter after review</span>
        <div class="button-group">
          <button type="button" class="button button-secondary" (click)="clearInput()">Clear</button>
          <button type="button" class="button button-primary" (click)="submitPolicy()">Submit</button>
        </div>
      </div>

      @if (submittedState() === 'submitted') {
        <p class="status">Policy text prepared for submission.</p>
      }
    </section>
  </section>
</main>
